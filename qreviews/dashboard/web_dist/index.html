    <title>QualReviews — qreviews dashboard</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("qreviews-color-scheme");
          var scheme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          document.documentElement.setAttribute("data-mantine-color-scheme", scheme);
          document.documentElement.style.colorScheme = scheme;
        } catch (_) {
          /* localStorage / matchMedia unavailable — leave defaults in place. */
        }
      })();
    </script>
