phabricator:
  base_url: https://phabricator.services.mozilla.com/api/
  poll_interval_seconds: 3600
  user_agent: "qreviews-bot/0.1 (jwein@mozilla.com)"
  # When polling, look back this many seconds before the last watermark so
  # nothing slips through a race window.
  watermark_overlap_seconds: 60
  # Don't try to score/review revisions whose raw diff exceeds this size.
  max_diff_bytes: 200000
  # PHIDs of non-application bots whose comments should not count as human
  # engagement. Herald and other PHID-APPL-* transactions are filtered
  # automatically; this list is for user-PHID bots like Lando, BMO-bot, etc.
  # ignore_commenter_phids:
  #   - PHID-USER-landobot
  #   - PHID-USER-bmobot

anthropic:
  # Cheap model for the scoring gate. Keep this fast and inexpensive.
  scoring_model: claude-haiku-4-5-20251001
  # Used for the full review when scores pass the threshold.
  review_model: claude-sonnet-4-6
  # Token caps to keep runaway costs bounded.
  scoring_max_tokens: 1024
  review_max_tokens: 4096

defaults:
  # A revision is auto-reviewed when BOTH risk and complexity are STRICTLY LESS
  # than these thresholds. Increase to be more permissive, decrease for stricter
  # gating.
  risk_threshold: 3
  complexity_threshold: 3

dashboard:
  host: 127.0.0.1
  port: 8765

storage:
  # Path to the SQLite file. Relative paths are resolved against the CWD where
  # the CLI is invoked.
  db_path: qreviews.db

reviewer_groups:
  - slug: ip-protection-reviewers
    enabled: true
    skill_path: skills/ip-protection-review/SKILL.md
    risk_threshold: 4
    complexity_threshold: 4
    # risk_threshold and complexity_threshold are optional here; omit to inherit defaults.
    # restrict_to_member_authors defaults to true: automated reviews only run for
    # revisions whose author is a member of the Phabricator project for this
    # slug. Set to false to open the group up to external authors.

  - slug: home-newtab-reviewers-rotation
    enabled: true
    skill_path: skills/home-newtab-review/SKILL.md
    # This is a Phabricator round-robin rotation: the group PHID is never the
    # reviewer during needs-review — it is replaced by a single rotated member
    # holding a blocking slot. Poll by member PHID and scope to that blocking
    # assignment instead of the group PHID (which never matches).
    rotation: true
    # The rotation already scopes review to this team, and it may route in
    # revisions authored by non-members, so don't additionally gate on author.
    restrict_to_member_authors: false
